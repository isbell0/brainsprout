<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainSprout - Learn Daily</title>
    <style>
        :root {
            --primary-green: #76c893;
            --soft-pink: #fce4ec;
            --dark-text: #333;
            --bg-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
        }

        /* Mobile Container */
        .app-container {
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background: var(--bg-white);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Content Feed (Scrollable) */
        .feed {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .video-slide {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #fff 0%, #e0f2f1 100%);
        }

        /* Elements from your design */
        .content-card {
            width: 85%;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .action-btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }

        /* Modal / Quiz Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 10;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-box {
            background: var(--soft-pink);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        /* Navigation Bar */
        .nav-bar {
            height: 60px;
            background: var(--primary-green);
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
        }

        .nav-item { font-size: 1.2rem; cursor: pointer; }

        .hidden { display: none; }
        .visible { display: flex; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="feed" id="mainFeed">
        <section class="video-slide">
            <div class="content-card">
                <h3>AP Calculus: Integrals</h3>
                <p>Learn the fundamentals of calculus basics!</p>
                <button class="action-btn" onclick="showQuiz()">Take Pop Quiz</button>
            </div>
        </section>

        <section class="video-slide" style="background: #fff5f8;">
            <div class="content-card">
                <h3>Biology: Photosynthesis</h3>
                <p>How plants turn light into energy.</p>
                <button class="action-btn" onclick="showQuiz()">Take Pop Quiz</button>
            </div>
        </section>
    </div>

    <div id="quizOverlay" class="overlay">
        <h2>Pop Quiz Time!</h2>
        <div class="quiz-box">
            <p>What is the sum of interior angles in any triangle?</p>
            <button class="action-btn" style="background:white; color:black; width:100%;" onclick="submitAnswer()">180 degrees</button>
            <button class="action-btn" style="background:white; color:black; width:100%;" onclick="submitAnswer()">360 degrees</button>
        </div>
    </div>

    <div id="reflectionOverlay" class="overlay">
        <h2>Reflection Time</h2>
        <p>How are you feeling today?</p>
        <div style="font-size: 2rem; display: flex; justify-content: space-around;">
            <span>😊</span><span>🤩</span><span>😐</span><span>😔</span>
        </div>
        <textarea placeholder="Coolest thing you learned?" style="margin-top:20px; height: 100px; border-radius: 10px; padding: 10px;"></textarea>
        <button class="action-btn" onclick="finishSession()">Submit & Earn Coins</button>
    </div>

    <div class="nav-bar">
        <span class="nav-item">🏠</span>
        <span class="nav-item">🎯</span>
        <span class="nav-item">🛍️</span>
        <span class="nav-item">👤</span>
    </div>
</div>

<script>
    function showQuiz() {
        document.getElementById('quizOverlay').style.display = 'flex';
    }

    function submitAnswer() {
        document.getElementById('quizOverlay').style.display = 'none';
        document.getElementById('reflectionOverlay').style.display = 'flex';
    }

    function finishSession() {
        alert("75 Coins Earned!");
        document.getElementById('reflectionOverlay').style.display = 'none';
    }
</script>

</body>
</html>
