<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainSprout - Interactive</title>
    <style>
        :root {
            --primary-green: #76c893;
            --soft-pink: #fce4ec;
            --accent-orange: #f3a952;
            --dark-text: #1a1a1a;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Mobile Frame */
        .app-container {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Header */
        header {
            padding: 20px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-weight: bold; font-size: 22px; font-family: serif; }
        .coins { background: #e9f5ee; padding: 5px 12px; border-radius: 20px; font-weight: bold; color: #2d6a4f; }

        /* Feed Area */
        .feed {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        .lesson-slide {
            height: 100%;
            scroll-snap-align: start;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Lesson Card Styling */
        .lesson-card {
            flex: 1;
            background: #f8f9fa;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        .lesson-img {
            height: 60%;
            background: #ddd center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .lesson-content { padding: 20px; }
        .tag { background: var(--primary-green); color: white; padding: 4px 12px; border-radius: 15px; font-size: 12px; }

        /* Pop-up Quiz Styling */
        .quiz-overlay {
            position: absolute;
            top: 100%; /* Hidden at bottom */
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 100;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .quiz-overlay.active { top: 0; }

        .quiz-box {
            background: var(--soft-pink);
            width: 100%;
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            margin: 20px 0;
        }

        /* Buttons */
        .btn-main {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .option-btn {
            background: white;
            border: 2px solid #eee;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:active { background: var(--accent-orange); color: white; }

        /* Nav Bar */
        nav {
            height: 75px;
            background: var(--primary-green);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-icon { font-size: 24px; color: white; cursor: pointer; opacity: 0.8; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">BrainSprout</div>
        <div class="coins">🪙 <span id="coinCount">602</span></div>
    </header>

    <div class="feed">
        <section class="lesson-slide">
            <div class="lesson-card">
                <div class="lesson-img" style="background-image: url('https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=400')"></div>
                <div class="lesson-content">
                    <span class="tag">Math</span>
                    <h3>AP Calculus: Integrals</h3>
                    <p>Learn how areas under curves represent total accumulation.</p>
                    <button class="btn-main" onclick="openQuiz('calculus')">Take Pop Quiz</button>
                </div>
            </div>
        </section>

        <section class="lesson-slide">
            <div class="lesson-card">
                <div class="lesson-img" style="background-image: url('https://images.unsplash.com/photo-1530026405186-ed1f139313f8?auto=format&fit=crop&w=400')"></div>
                <div class="lesson-content">
                    <span class="tag">Biology</span>
                    <h3>Photosynthesis</h3>
                    <p>The process by which plants turn sunlight into energy.</p>
                    <button class="btn-main" onclick="openQuiz('biology')">Take Pop Quiz</button>
                </div>
            </div>
        </section>
    </div>

    <div id="quizOverlay" class="quiz-overlay">
        <button onclick="closeQuiz()" style="align-self: flex-start; background:none; border:none; font-size: 30px;">✕</button>
        <h2 id="quizTitle">Pop Quiz Time!</h2>
        <div class="quiz-box">
            <p id="quizQuestion">Question loading...</p>
            <div id="optionsArea"></div>
        </div>
        <p style="color: #888; font-size: 12px;">Earn +75 Coins for correct answers!</p>
    </div>

    <nav>
        <span class="nav-icon">🏠</span>
        <span class="nav-icon">🎯</span>
        <span class="nav-icon">🛍️</span>
        <span class="nav-icon">👤</span>
    </nav>
</div>

<script>
    const quizData = {
        calculus: {
            question: "What is the sum of all interior angles in a triangle?",
            options: ["90 degrees", "180 degrees", "360 degrees"],
            answer: "180 degrees"
        },
        biology: {
            question: "Which organelle is responsible for photosynthesis?",
            options: ["Mitochondria", "Nucleus", "Chloroplast"],
            answer: "Chloroplast"
        }
    };

    let coins = 602;

    function openQuiz(subject) {
        const data = quizData[subject];
        document.getElementById('quizQuestion').innerText = data.question;
        
        const optionsArea = document.getElementById('optionsArea');
        optionsArea.innerHTML = ''; // Clear old buttons
        
        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, data.answer);
            optionsArea.appendChild(btn);
        });

        document.getElementById('quizOverlay').classList.add('active');
    }

    function checkAnswer(selected, correct) {
        if(selected === correct) {
            coins += 75;
            document.getElementById('coinCount').innerText = coins;
            alert("Correct! +75 Coins 🎊");
        } else {
            alert("Oops! Not quite. Try reviewing the lesson.");
        }
        closeQuiz();
    }

    function closeQuiz() {
        document.getElementById('quizOverlay').classList.remove('active');
    }
</script>

</body>
</html>
